version: '3.9'

services:
  # ─────────────────────────────────────────
  # PostgreSQL (로컬 개발용 - 운영은 AWS RDS 사용)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: point_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pointdb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-pointdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis (세션/캐시)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: point_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────
  # Backend (NestJS)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: point_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-pointdb}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CALLBACK_URL: ${KAKAO_CALLBACK_URL:-}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      NAVER_CALLBACK_URL: ${NAVER_CALLBACK_URL:-}
      TELECOM_PROVIDER: ${TELECOM_PROVIDER:-MOCK}
      NICE_SITE_CODE: ${NICE_SITE_CODE:-}
      NICE_SITE_PASSWORD: ${NICE_SITE_PASSWORD:-}
      CORS_ORIGINS: http://localhost:3001
      FRONTEND_URL: http://localhost:3001
      EXTERNAL_API_KEY: ${EXTERNAL_API_KEY:-dev_api_key_change_me}
    ports:
      - "3000:3000"
    volumes:
      - backend_logs:/app/logs

  # ─────────────────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
    container_name: point_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
    ports:
      - "3001:3001"

  # ─────────────────────────────────────────
  # Nginx 리버스 프록시
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: point_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
  redis_data:
  backend_logs:

networks:
  default:
    name: point_network
